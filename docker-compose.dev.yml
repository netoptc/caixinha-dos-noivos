version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: caixinha_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: caixinha_db_init_dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ASAAS_API_KEY: "$$aact_hmlg_000MzkwODA2MWY2OGM3MWRlMDU2NWM3MzJlNzZmNGZhZGY6OmU5MjFjYmYxLWQ0MjAtNDE4MC04ODFjLTU4MTBjMDE0NGM2NTo6JGFhY2hfNDcyZTZiZTktYTBiOS00ZTA2LWI1NDItOTA3ZDgyYjc2MDc1"
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss && npm run db:seed"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: caixinha_app_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ASAAS_API_KEY: "$$aact_hmlg_000MzkwODA2MWY2OGM3MWRlMDU2NWM3MzJlNzZmNGZhZGY6OmU5MjFjYmYxLWQ0MjAtNDE4MC04ODFjLTU4MTBjMDE0NGM2NTo6JGFhY2hfNDcyZTZiZTktYTBiOS00ZTA2LWI1NDItOTA3ZDgyYjc2MDc1"
    ports:
      - "3000:3000"
    volumes:
      - .:/app                          # monta o código local → hot reload
      - /app/node_modules               # preserva node_modules do container
      - /app/.next                      # preserva cache de build do container
      - ./public/uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

volumes:
  postgres_dev_data:
