name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build e push para GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH na VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Sincronizar .env.production na VPS a partir dos secrets
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,NEXTAUTH_SECRET,NEXTAUTH_URL,NEXT_PUBLIC_APP_URL,PLATFORM_FEE_PIX,PLATFORM_FEE_CREDIT_CARD,ASAAS_ENV,ASAAS_API_URL,ASAAS_API_KEY,ASAAS_WEBHOOK_TOKEN,ASAAS_FEE_PIX,ASAAS_FEE_CARD_FIXED,ASAAS_FEE_CARD_VISTA,ASAAS_FEE_CARD_2_6,ASAAS_FEE_CARD_7_12,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASSWORD,SMTP_FROM
          script: |
            set -euo pipefail
            umask 077
            mkdir -p /var/caixinha/app
            cat > /var/caixinha/app/.env.production <<ENV
            # Auto-gerado pelo GitHub Actions em $(date -u +%FT%TZ) — nao editar a mao
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB}
            DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
            NEXTAUTH_URL=${NEXTAUTH_URL}
            NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
            PLATFORM_FEE_PIX=${PLATFORM_FEE_PIX}
            PLATFORM_FEE_CREDIT_CARD=${PLATFORM_FEE_CREDIT_CARD}
            ASAAS_ENV=${ASAAS_ENV}
            ASAAS_API_URL=${ASAAS_API_URL}
            ASAAS_API_KEY=${ASAAS_API_KEY}
            ASAAS_WEBHOOK_TOKEN=${ASAAS_WEBHOOK_TOKEN}
            ASAAS_FEE_PIX=${ASAAS_FEE_PIX}
            ASAAS_FEE_CARD_FIXED=${ASAAS_FEE_CARD_FIXED}
            ASAAS_FEE_CARD_VISTA=${ASAAS_FEE_CARD_VISTA}
            ASAAS_FEE_CARD_2_6=${ASAAS_FEE_CARD_2_6}
            ASAAS_FEE_CARD_7_12=${ASAAS_FEE_CARD_7_12}
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_SECURE=${SMTP_SECURE}
            SMTP_USER=${SMTP_USER}
            SMTP_PASSWORD=${SMTP_PASSWORD}
            SMTP_FROM=${SMTP_FROM}
            ENV
            chmod 600 /var/caixinha/app/.env.production
            chown root:root /var/caixinha/app/.env.production
            echo "OK: .env.production sincronizado ($(wc -l < /var/caixinha/app/.env.production) linhas)"

      - name: Atualizar stack (pull + migrate + up)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /var/caixinha/app

            export APP_IMAGE="ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.image_tag }}"
            echo "Deploying $APP_IMAGE"

            docker compose pull app db-migrate
            docker compose up -d postgres
            docker compose run --rm db-migrate
            docker compose up -d app
            docker image prune -f
