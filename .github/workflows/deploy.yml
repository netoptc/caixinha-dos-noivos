name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build e push para GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          build-args: |
            NEXT_PUBLIC_MIN_DONATION_AMOUNT=${{ secrets.NEXT_PUBLIC_MIN_DONATION_AMOUNT || '10' }}
            NEXT_PUBLIC_MIN_INSTALLMENT_VALUE=${{ secrets.NEXT_PUBLIC_MIN_INSTALLMENT_VALUE || '5' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH na VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Sincronizar .env.production na VPS a partir dos secrets
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_MIN_DONATION_AMOUNT: ${{ secrets.NEXT_PUBLIC_MIN_DONATION_AMOUNT || '10' }}
          NEXT_PUBLIC_MIN_INSTALLMENT_VALUE: ${{ secrets.NEXT_PUBLIC_MIN_INSTALLMENT_VALUE || '5' }}
          PLATFORM_FEE_PIX: ${{ secrets.PLATFORM_FEE_PIX }}
          PLATFORM_FEE_CREDIT_CARD: ${{ secrets.PLATFORM_FEE_CREDIT_CARD }}
          ASAAS_ENV: ${{ secrets.ASAAS_ENV }}
          ASAAS_API_URL: ${{ secrets.ASAAS_API_URL }}
          ASAAS_API_KEY: ${{ secrets.ASAAS_API_KEY }}
          ASAAS_WEBHOOK_TOKEN: ${{ secrets.ASAAS_WEBHOOK_TOKEN }}
          ASAAS_WITHDRAWAL_WEBHOOK_TOKEN: ${{ secrets.ASAAS_WITHDRAWAL_WEBHOOK_TOKEN }}
          ASAAS_FEE_PIX: ${{ secrets.ASAAS_FEE_PIX }}
          ASAAS_FEE_CARD_FIXED: ${{ secrets.ASAAS_FEE_CARD_FIXED }}
          ASAAS_FEE_CARD_VISTA: ${{ secrets.ASAAS_FEE_CARD_VISTA }}
          ASAAS_FEE_CARD_2_6: ${{ secrets.ASAAS_FEE_CARD_2_6 }}
          ASAAS_FEE_CARD_7_12: ${{ secrets.ASAAS_FEE_CARD_7_12 }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,NEXTAUTH_SECRET,NEXTAUTH_URL,NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_MIN_DONATION_AMOUNT,NEXT_PUBLIC_MIN_INSTALLMENT_VALUE,PLATFORM_FEE_PIX,PLATFORM_FEE_CREDIT_CARD,ASAAS_ENV,ASAAS_API_URL,ASAAS_API_KEY,ASAAS_WEBHOOK_TOKEN,ASAAS_WITHDRAWAL_WEBHOOK_TOKEN,ASAAS_FEE_PIX,ASAAS_FEE_CARD_FIXED,ASAAS_FEE_CARD_VISTA,ASAAS_FEE_CARD_2_6,ASAAS_FEE_CARD_7_12,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASSWORD,SMTP_FROM
          script: |
            set -euo pipefail
            umask 077
            mkdir -p /var/caixinha/app
            # Aspas single: dotenv nao expande $ dentro de '...', necessario pra
            # ASAAS_API_KEY que comeca com $ ($aact_...). Pressupoe ausencia de '
            # nos valores dos secrets.
            cat > /var/caixinha/app/.env.production <<ENV
            # Auto-gerado pelo GitHub Actions em $(date -u +%FT%TZ) - nao editar a mao
            POSTGRES_USER='${POSTGRES_USER}'
            POSTGRES_PASSWORD='${POSTGRES_PASSWORD}'
            POSTGRES_DB='${POSTGRES_DB}'
            DATABASE_URL='postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}'
            NEXTAUTH_SECRET='${NEXTAUTH_SECRET}'
            NEXTAUTH_URL='${NEXTAUTH_URL}'
            NEXT_PUBLIC_APP_URL='${NEXT_PUBLIC_APP_URL}'
            NEXT_PUBLIC_MIN_DONATION_AMOUNT='${NEXT_PUBLIC_MIN_DONATION_AMOUNT}'
            NEXT_PUBLIC_MIN_INSTALLMENT_VALUE='${NEXT_PUBLIC_MIN_INSTALLMENT_VALUE}'
            PLATFORM_FEE_PIX='${PLATFORM_FEE_PIX}'
            PLATFORM_FEE_CREDIT_CARD='${PLATFORM_FEE_CREDIT_CARD}'
            ASAAS_ENV='${ASAAS_ENV}'
            ASAAS_API_URL='${ASAAS_API_URL}'
            ASAAS_API_KEY='${ASAAS_API_KEY}'
            ASAAS_WEBHOOK_TOKEN='${ASAAS_WEBHOOK_TOKEN}'
            ASAAS_WITHDRAWAL_WEBHOOK_TOKEN='${ASAAS_WITHDRAWAL_WEBHOOK_TOKEN}'
            ASAAS_FEE_PIX='${ASAAS_FEE_PIX}'
            ASAAS_FEE_CARD_FIXED='${ASAAS_FEE_CARD_FIXED}'
            ASAAS_FEE_CARD_VISTA='${ASAAS_FEE_CARD_VISTA}'
            ASAAS_FEE_CARD_2_6='${ASAAS_FEE_CARD_2_6}'
            ASAAS_FEE_CARD_7_12='${ASAAS_FEE_CARD_7_12}'
            SMTP_HOST='${SMTP_HOST}'
            SMTP_PORT='${SMTP_PORT}'
            SMTP_SECURE='${SMTP_SECURE}'
            SMTP_USER='${SMTP_USER}'
            SMTP_PASSWORD='${SMTP_PASSWORD}'
            SMTP_FROM='${SMTP_FROM}'
            ENV
            chmod 600 /var/caixinha/app/.env.production
            chown root:root /var/caixinha/app/.env.production
            echo "OK: .env.production sincronizado ($(wc -l < /var/caixinha/app/.env.production) linhas)"

      - name: Atualizar stack (pull + migrate + up)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /var/caixinha/app

            export APP_IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
            echo "Deploying $APP_IMAGE"

            # --env-file: compose le .env por default; aqui forcamos .env.production
            # tanto pra interpolacao ${VAR} no compose quanto pra env_file dos services
            COMPOSE="docker compose --env-file .env.production"
            $COMPOSE pull app db-migrate
            $COMPOSE up -d postgres
            $COMPOSE run --rm db-migrate
            $COMPOSE up -d app
            docker image prune -f
